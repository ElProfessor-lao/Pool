<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkillSwap - Barter Skills, Build Community</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #333;
        }

        .app-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            background: white;
            border-radius: 20px;
            padding: 20px 30px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        .logo h1 {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-size: 28px;
        }

        .logo p {
            font-size: 12px;
            color: #666;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .reputation {
            background: #f0f0f0;
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: bold;
            color: #667eea;
        }

        .btn-logout {
            padding: 8px 20px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .tab {
            padding: 12px 24px;
            background: rgba(255,255,255,0.9);
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }

        .tab.active {
            background: white;
            color: #667eea;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .cards-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
        }

        .skill-card {
            background: white;
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
            transition: transform 0.3s;
        }

        .skill-card:hover {
            transform: translateY(-5px);
        }

        .skill-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 15px;
        }

        .skill-title {
            font-size: 20px;
            font-weight: bold;
            color: #333;
        }

        .skill-category {
            background: #667eea20;
            padding: 4px 12px;
            border-radius: 15px;
            font-size: 12px;
            color: #667eea;
        }

        .skill-description {
            color: #666;
            margin-bottom: 15px;
            line-height: 1.5;
        }

        .skill-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid #eee;
            padding-top: 15px;
            gap: 10px;
            flex-wrap: wrap;
        }

        .btn-primary, .btn-success, .btn-warning {
            padding: 8px 20px;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            color: white;
        }

        .btn-primary { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        .btn-success { background: #51cf66; }
        .btn-warning { background: #ff9f43; }

        .swipe-container {
            background: white;
            border-radius: 30px;
            padding: 30px;
            max-width: 500px;
            margin: 0 auto;
            text-align: center;
        }

        .swipe-card {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            border-radius: 20px;
            padding: 40px;
            margin-bottom: 20px;
            min-height: 350px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .swipe-actions {
            display: flex;
            gap: 20px;
            justify-content: center;
        }

        .swipe-btn {
            padding: 15px 30px;
            font-size: 18px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            transition: transform 0.2s;
        }

        .swipe-btn.no { background: #ff6b6b; color: white; }
        .swipe-btn.yes { background: #51cf66; color: white; }
        .swipe-btn:hover { transform: scale(1.05); }

        .form-container {
            background: white;
            border-radius: 20px;
            padding: 30px;
            max-width: 500px;
            margin: 0 auto;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
        }

        .form-group input, .form-group textarea, .form-group select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
        }

        .badge {
            padding: 4px 12px;
            border-radius: 15px;
            font-size: 12px;
            font-weight: bold;
        }

        .badge.pending { background: #ffd93d; color: #8b6b00; }
        .badge.confirmed { background: #51cf66; color: #1e4620; }
        .badge.scheduled { background: #ff9f43; color: #5e3a1a; }

        .modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }

        .modal-content {
            background: white;
            border-radius: 20px;
            padding: 30px;
            max-width: 500px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
        }

        .message {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px 25px;
            border-radius: 10px;
            color: white;
            z-index: 1000;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        .chat-container {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 400px;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }

        .message-bubble {
            margin-bottom: 15px;
            display: flex;
            flex-direction: column;
        }

        .message-bubble.sent { align-items: flex-end; }
        .message-bubble.received { align-items: flex-start; }

        .message-content {
            max-width: 70%;
            padding: 10px 15px;
            border-radius: 18px;
            word-wrap: break-word;
        }

        .message-bubble.sent .message-content {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .message-bubble.received .message-content {
            background: #f0f0f0;
            color: #333;
        }

        .chat-input {
            display: flex;
            padding: 15px;
            border-top: 1px solid #eee;
            gap: 10px;
        }

        .chat-input input {
            flex: 1;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 20px;
            outline: none;
        }

        .section-title {
            margin: 20px 0 15px 0;
            padding-bottom: 10px;
            border-bottom: 2px solid #eee;
        }

        @media (max-width: 768px) {
            .app-container { padding: 10px; }
            .cards-container { grid-template-columns: 1fr; }
        }

        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="header">
            <div class="logo">
                <h1>⚡ SkillSwap</h1>
                <p>Barter skills, build community</p>
            </div>
            <div class="user-info">
                <div class="reputation" id="reputationDisplay">⭐ 42 | 12 trades</div>
                <button class="btn-logout" onclick="showMessage('Demo mode - logout not available')">Logout</button>
            </div>
        </div>

        <div class="tabs">
            <button class="tab active" onclick="switchTab('swipe')">🔍 Discover</button>
            <button class="tab" onclick="switchTab('matches')">💕 Matches <span id="matchCount">(3)</span></button>
            <button class="tab" onclick="switchTab('sessions')">📅 Sessions <span id="sessionCount">(2)</span></button>
            <button class="tab" onclick="switchTab('debt')">💰 Debt</button>
            <button class="tab" onclick="showAddSkill()">+ Add Skill</button>
        </div>

        <div id="swipeTab"></div>
        <div id="matchesTab" class="hidden"></div>
        <div id="sessionsTab" class="hidden"></div>
        <div id="debtTab" class="hidden"></div>
    </div>

    <div id="messageContainer"></div>
    <div id="modalContainer"></div>

    <script>
        // ============ DEMO DATA ============
        let userSkills = [
            { id: 1, title: "Python Programming", category: "Programming", description: "Beginner to intermediate Python" },
            { id: 2, title: "JavaScript", category: "Programming", description: "React and Node.js" },
            { id: 3, title: "Web Design", category: "Art", description: "HTML, CSS, responsive design" }
        ];

        let availableSkills = [
            { id: 1, title: "Guitar", category: "Music", description: "Acoustic guitar lessons for beginners", user: { username: "Sarah", reputation: 38 } },
            { id: 2, title: "Spanish", category: "Language", description: "Conversational Spanish", user: { username: "Mike", reputation: 25 } },
            { id: 3, title: "Yoga", category: "Fitness", description: "Beginner yoga classes", user: { username: "Emma", reputation: 52 } },
            { id: 4, title: "Photography", category: "Art", description: "DSLR basics and composition", user: { username: "David", reputation: 44 } },
            { id: 5, title: "Cooking", category: "Other", description: "Italian and Asian cuisine", user: { username: "Lisa", reputation: 31 } }
        ];

        let matches = [
            { id: 1, status: 'confirmed', partner: { username: "Sarah", reputation: 38, email: "sarah@example.com", phone: "+1 234-567-8900" }, your_skill: { title: "Python Programming" }, their_skill: { title: "Guitar" }, is_sender: false },
            { id: 2, status: 'pending', partner: { username: "Mike", reputation: 25, email: "mike@example.com", phone: "+1 987-654-3210" }, your_skill: { title: "JavaScript" }, their_skill: { title: "Spanish" }, is_sender: true },
            { id: 3, status: 'pending', partner: { username: "Emma", reputation: 52, email: "emma@example.com", phone: "+1 555-123-4567" }, your_skill: { title: "React" }, their_skill: { title: "Yoga" }, is_sender: false }
        ];

        let sessions = [
            { id: 1, status: 'scheduled', partner: { username: "Sarah" }, your_skill: "Python Programming", their_skill: "Guitar", scheduled_time: "March 15, 2024 at 3:00 PM", location: "Zoom: https://zoom.us/j/123456789", notes: "Bring your guitar!" },
            { id: 2, status: 'confirmed', partner: { username: "David" }, your_skill: "Web Design", their_skill: "Photography", scheduled_time: "March 18, 2024 at 2:00 PM", location: "Central Library", notes: "Meet at main entrance" }
        ];

        let debt = { balance: 5, given: 15, received: 10, completed_trades: 12, reputation: 42 };

        let currentSwipeIndex = 0;
        let selectedMatch = null;
        let messages = [];

        // ============ HELPER FUNCTIONS ============
        function showMessage(msg, type = 'success') {
            const container = document.getElementById('messageContainer');
            const div = document.createElement('div');
            div.className = 'message';
            div.style.background = type === 'success' ? '#51cf66' : '#ff6b6b';
            div.textContent = msg;
            container.appendChild(div);
            setTimeout(() => div.remove(), 3000);
        }

        function closeModal() {
            document.getElementById('modalContainer').innerHTML = '';
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        // ============ RENDER FUNCTIONS ============
        function renderSwipeTab() {
            const container = document.getElementById('swipeTab');
            
            if (userSkills.length === 0) {
                container.innerHTML = `
                    <div class="swipe-container">
                        <div class="swipe-card">
                            <h3>📝 Add a skill first!</h3>
                            <p>You need to add a skill you can teach before you can learn from others.</p>
                            <button class="btn-primary" onclick="showAddSkill()" style="margin-top:20px">+ Add Your First Skill</button>
                        </div>
                    </div>
                `;
                return;
            }
            
            if (availableSkills.length === 0) {
                container.innerHTML = `
                    <div class="swipe-container">
                        <div class="swipe-card">
                            <h3>✨ No skills available</h3>
                            <p>Check back later or invite friends to join!</p>
                        </div>
                    </div>
                `;
                return;
            }

            const skill = availableSkills[currentSwipeIndex];
            container.innerHTML = `
                <div class="swipe-container">
                    <div class="swipe-card">
                        <h2 style="margin-bottom:15px">${escapeHtml(skill.title)}</h2>
                        <span class="skill-category">${escapeHtml(skill.category)}</span>
                        <p style="margin-top:20px; line-height:1.6">${escapeHtml(skill.description)}</p>
                        <div style="margin-top:20px; padding-top:20px; border-top:1px solid rgba(0,0,0,0.1)">
                            <p>👤 Offered by: ${escapeHtml(skill.user.username)}</p>
                            <p>⭐ ${skill.user.reputation} reputation</p>
                        </div>
                    </div>
                    <div class="swipe-actions">
                        <button class="swipe-btn no" onclick="handlePass()">👎 Pass</button>
                        <button class="swipe-btn yes" onclick="handleSwipe(${skill.id})">👍 Interested</button>
                    </div>
                </div>
            `;
        }

        function handlePass() {
            currentSwipeIndex = (currentSwipeIndex + 1) % availableSkills.length;
            renderSwipeTab();
        }

        function handleSwipe(skillId) {
            const skill = availableSkills.find(s => s.id === skillId);
            showMessage(`✓ Interest sent to ${skill.user.username}! They'll be notified.`);
            currentSwipeIndex = (currentSwipeIndex + 1) % availableSkills.length;
            renderSwipeTab();
        }

        function renderMatchesTab() {
            const container = document.getElementById('matchesTab');
            const pendingIncoming = matches.filter(m => m.status === 'pending' && !m.is_sender);
            const pendingOutgoing = matches.filter(m => m.status === 'pending' && m.is_sender);
            const confirmed = matches.filter(m => m.status === 'confirmed');
            
            if (matches.length === 0) {
                container.innerHTML = `
                    <div class="form-container">
                        <h3 style="text-align:center">💕 No matches yet</h3>
                        <p style="text-align:center; margin-top:10px">Swipe on skills you want to learn!</p>
                    </div>
                `;
                return;
            }

            let html = '';

            if (pendingIncoming.length > 0) {
                html += `<h3 class="section-title" style="color:#ff9f43">📨 Pending Requests (${pendingIncoming.length})</h3><div class="cards-container">`;
                pendingIncoming.forEach(m => {
                    html += `
                        <div class="skill-card">
                            <div class="skill-header">
                                <div class="skill-title">${escapeHtml(m.their_skill.title)}</div>
                                <span class="badge pending">Awaiting Response</span>
                            </div>
                            <p class="skill-description">${escapeHtml(m.partner.username)} wants to teach you ${escapeHtml(m.their_skill.title)} in exchange for your ${escapeHtml(m.your_skill.title)}</p>
                            <div style="margin-top:10px; padding:10px; background:#f8f9fa; border-radius:10px">
                                <p style="font-size:12px">📧 ${escapeHtml(m.partner.email)}</p>
                                <p style="font-size:12px">📱 ${escapeHtml(m.partner.phone)}</p>
                                <p style="font-size:12px; margin-top:5px">⭐ Reputation: ${m.partner.reputation}</p>
                            </div>
                            <div class="skill-footer">
                                <button class="btn-success" onclick="confirmMatch(${m.id})">✅ Accept Match</button>
                                <button class="btn-primary" onclick="openChat(${m.id})">💬 Message</button>
                            </div>
                        </div>
                    `;
                });
                html += `</div>`;
            }

            if (pendingOutgoing.length > 0) {
                html += `<h3 class="section-title" style="color:#667eea">📤 Sent Requests (${pendingOutgoing.length})</h3><div class="cards-container">`;
                pendingOutgoing.forEach(m => {
                    html += `
                        <div class="skill-card">
                            <div class="skill-header">
                                <div class="skill-title">${escapeHtml(m.their_skill.title)}</div>
                                <span class="badge pending">Waiting for Response</span>
                            </div>
                            <p class="skill-description">You want to learn ${escapeHtml(m.their_skill.title)} from ${escapeHtml(m.partner.username)}</p>
                            <div style="margin-top:10px; padding:10px; background:#f8f9fa; border-radius:10px">
                                <p style="font-size:12px">📧 ${escapeHtml(m.partner.email)}</p>
                                <p style="font-size:12px">📱 ${escapeHtml(m.partner.phone)}</p>
                            </div>
                            <div class="skill-footer">
                                <button class="btn-primary" onclick="openChat(${m.id})">💬 Message</button>
                            </div>
                        </div>
                    `;
                });
                html += `</div>`;
            }

            if (confirmed.length > 0) {
                html += `<h3 class="section-title" style="color:#51cf66">✅ Confirmed Matches (${confirmed.length})</h3><div class="cards-container">`;
                confirmed.forEach(m => {
                    html += `
                        <div class="skill-card">
                            <div class="skill-header">
                                <div class="skill-title">${escapeHtml(m.your_skill.title)} ⇄ ${escapeHtml(m.their_skill.title)}</div>
                                <span class="badge confirmed">Confirmed</span>
                            </div>
                            <p class="skill-description">With ${escapeHtml(m.partner.username)} (⭐ ${m.partner.reputation})</p>
                            <div style="margin-top:10px; padding:10px; background:#f8f9fa; border-radius:10px">
                                <p style="font-size:12px">📧 ${escapeHtml(m.partner.email)}</p>
                                <p style="font-size:12px">📱 ${escapeHtml(m.partner.phone)}</p>
                            </div>
                            <div class="skill-footer">
                                <button class="btn-primary" onclick="openChat(${m.id})">💬 Message</button>
                                <button class="btn-warning" onclick="openSchedule(${m.id})">📅 Schedule Meeting</button>
                            </div>
                        </div>
                    `;
                });
                html += `</div>`;
            }

            container.innerHTML = html;
        }

        function confirmMatch(matchId) {
            showMessage('✓ Match confirmed! You can now schedule a session.', 'success');
        }

        function openChat(matchId) {
            selectedMatch = matches.find(m => m.id === matchId);
            messages = [
                { id: 1, content: "Hi! I saw we matched. When are you free to meet?", is_sent: false, timestamp: new Date().toISOString() },
                { id: 2, content: "Hey! I'm free this weekend. How about Saturday?", is_sent: true, timestamp: new Date().toISOString() }
            ];
            renderChatModal();
        }

        function renderChatModal() {
            let messagesHtml = '';
            messages.forEach(m => {
                messagesHtml += `
                    <div class="message-bubble ${m.is_sent ? 'sent' : 'received'}">
                        <div class="message-content">${escapeHtml(m.content)}</div>
                        <div style="font-size:10px; margin-top:4px; color:#888">${new Date(m.timestamp).toLocaleTimeString()}</div>
                    </div>
                `;
            });

            const modalHtml = `
                <div class="modal" onclick="closeModal()">
                    <div class="modal-content" onclick="event.stopPropagation()">
                        <h2 style="margin-bottom:15px">💬 Chat with ${escapeHtml(selectedMatch.partner.username)}</h2>
                        <div class="chat-container">
                            <div class="chat-messages" id="chatMessages">
                                ${messagesHtml}
                                <div id="chatEnd"></div>
                            </div>
                            <div class="chat-input">
                                <input type="text" id="chatInput" placeholder="Type a message..." onkeypress="if(event.key==='Enter') sendChatMessage()">
                                <button class="btn-primary" onclick="sendChatMessage()">Send</button>
                            </div>
                        </div>
                        <button class="btn-primary" onclick="closeModal()" style="margin-top:15px; background:#999">Close</button>
                    </div>
                </div>
            `;
            document.getElementById('modalContainer').innerHTML = modalHtml;
            document.getElementById('chatEnd')?.scrollIntoView({ behavior: 'smooth' });
        }

        function sendChatMessage() {
            const input = document.getElementById('chatInput');
            if (input && input.value.trim()) {
                const newMsg = {
                    id: Date.now(),
                    content: input.value,
                    is_sent: true,
                    timestamp: new Date().toISOString()
                };
                messages.push(newMsg);
                showMessage('Message sent! (Demo mode)', 'success');
                
                const messagesDiv = document.getElementById('chatMessages');
                if (messagesDiv) {
                    const msgHtml = `
                        <div class="message-bubble sent">
                            <div class="message-content">${escapeHtml(newMsg.content)}</div>
                            <div style="font-size:10px; margin-top:4px; color:#888">${new Date(newMsg.timestamp).toLocaleTimeString()}</div>
                        </div>
                    `;
                    messagesDiv.insertAdjacentHTML('beforeend', msgHtml);
                    document.getElementById('chatEnd')?.scrollIntoView({ behavior: 'smooth' });
                }
                input.value = '';
            }
        }

        function openSchedule(matchId) {
            selectedMatch = matches.find(m => m.id === matchId);
            const modalHtml = `
                <div class="modal" onclick="closeModal()">
                    <div class="modal-content" onclick="event.stopPropagation()">
                        <h2 style="margin-bottom:20px">📅 Schedule with ${escapeHtml(selectedMatch.partner.username)}</h2>
                        <div style="margin-bottom:20px; padding:15px; background:#f8f9fa; border-radius:10px">
                            <p>🤝 You teach: ${escapeHtml(selectedMatch.your_skill.title)}</p>
                            <p style="margin-top:5px">📚 You learn: ${escapeHtml(selectedMatch.their_skill.title)}</p>
                        </div>
                        <div class="form-group">
                            <label>Date *</label>
                            <input type="date" id="scheduleDate">
                        </div>
                        <div class="form-group">
                            <label>Time *</label>
                            <input type="time" id="scheduleTime">
                        </div>
                        <div class="form-group">
                            <label>Location</label>
                            <input type="text" id="scheduleLocation" placeholder="Zoom link, coffee shop, etc.">
                        </div>
                        <div class="form-group">
                            <label>Notes</label>
                            <textarea id="scheduleNotes" rows="3" placeholder="What to bring, specific topics..."></textarea>
                        </div>
                        <div style="display:flex; gap:10px; margin-top:20px">
                            <button class="btn-success" onclick="scheduleSession()">✅ Schedule</button>
                            <button class="btn-primary" onclick="closeModal()" style="background:#999">Cancel</button>
                        </div>
                    </div>
                </div>
            `;
            document.getElementById('modalContainer').innerHTML = modalHtml;
        }

        function scheduleSession() {
            const date = document.getElementById('scheduleDate')?.value;
            const time = document.getElementById('scheduleTime')?.value;
            if (!date || !time) {
                showMessage('Please select date and time', 'error');
                return;
            }
            showMessage(`✓ Session scheduled for ${date} at ${time}!`, 'success');
            closeModal();
        }

        function renderSessionsTab() {
            const container = document.getElementById('sessionsTab');
            if (sessions.length === 0) {
                container.innerHTML = `
                    <div class="form-container">
                        <h3 style="text-align:center">📅 No sessions yet</h3>
                        <p style="text-align:center; margin-top:10px">Schedule a meeting from your confirmed matches!</p>
                    </div>
                `;
                return;
            }

            let html = '<h2 style="margin-bottom:20px">Your Sessions</h2><div class="cards-container">';
            sessions.forEach(s => {
                html += `
                    <div class="skill-card">
                        <div class="skill-header">
                            <div class="skill-title">With ${escapeHtml(s.partner.username)}</div>
                            <span class="badge ${s.status}">${s.status}</span>
                        </div>
                        <p>🤝 You teach: ${escapeHtml(s.your_skill)}</p>
                        <p>📚 You learn: ${escapeHtml(s.their_skill)}</p>
                        <p style="font-weight:bold; margin:10px 0; color:#667eea">📅 ${escapeHtml(s.scheduled_time)}</p>
                        ${s.location ? `<p>📍 ${escapeHtml(s.location)}</p>` : ''}
                        ${s.notes ? `<p>📝 ${escapeHtml(s.notes)}</p>` : ''}
                        <div class="skill-footer">
                            <button class="btn-success" onclick="completeSession(${s.id})">✓ Mark Completed</button>
                        </div>
                    </div>
                `;
            });
            html += '</div>';
            container.innerHTML = html;
        }

        function completeSession(sessionId) {
            showMessage('✓ Session marked as completed! Reputation points added.', 'success');
        }

        function renderDebtTab() {
            const container = document.getElementById('debtTab');
            container.innerHTML = `
                <div class="form-container">
                    <h2 style="margin-bottom:20px">💰 Debt Tracking</h2>
                    <div style="text-align:center; padding:20px; background:#f8f9fa; border-radius:15px; margin-bottom:20px">
                        <h3>Your Balance</h3>
                        <p style="font-size:48px; font-weight:bold; color:${debt.balance >= 0 ? '#51cf66' : '#ff6b6b'}">${debt.balance} hours</p>
                        <p>${debt.balance >= 0 ? '✨ You\'ve taught more than you\'ve learned' : '📚 You\'ve learned more than you\'ve taught'}</p>
                    </div>
                    <div>
                        <p style="margin:10px 0">✅ Hours taught: ${debt.given}</p>
                        <p style="margin:10px 0">📖 Hours learned: ${debt.received}</p>
                        <p style="margin:10px 0">🤝 Total trades: ${debt.completed_trades}</p>
                        <p style="margin:10px 0">⭐ Reputation: ${debt.reputation}/5</p>
                    </div>
                </div>
            `;
        }

        function showAddSkill() {
            const modalHtml = `
                <div class="modal" onclick="closeModal()">
                    <div class="modal-content" onclick="event.stopPropagation()">
                        <h3>Add New Skill</h3>
                        <div class="form-group">
                            <input type="text" id="skillTitle" placeholder="Skill Title *">
                        </div>
                        <div class="form-group">
                            <select id="skillCategory">
                                <option value="">Select Category</option>
                                <option value="Programming">Programming</option>
                                <option value="Music">Music</option>
                                <option value="Language">Language</option>
                                <option value="Fitness">Fitness</option>
                                <option value="Art">Art</option>
                                <option value="Other">Other</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <textarea id="skillDescription" rows="3" placeholder="Description"></textarea>
                        </div>
                        <div style="display:flex; gap:10px; margin-top:20px">
                            <button class="btn-primary" onclick="addNewSkill()">Add Skill</button>
                            <button class="btn-primary" onclick="closeModal()" style="background:#999">Cancel</button>
                        </div>
                    </div>
                </div>
            `;
            document.getElementById('modalContainer').innerHTML = modalHtml;
        }

        function addNewSkill() {
            const title = document.getElementById('skillTitle')?.value;
            const category = document.getElementById('skillCategory')?.value;
            const description = document.getElementById('skillDescription')?.value;
            
            if (!title || !category) {
                showMessage('Please fill required fields', 'error');
                return;
            }
            
            const newSkill = {
                id: userSkills.length + 1,
                title: title,
                category: category,
                description: description || 'No description provided'
            };
            userSkills.push(newSkill);
            showMessage(`"${title}" added successfully!`, 'success');
            closeModal();
            
            // Refresh current tab if on swipe
            if (document.querySelector('.tab.active')?.innerText.includes('Discover')) {
                renderSwipeTab();
            }
        }

        // ============ TAB SWITCHING ============
        function switchTab(tabName) {
            // Update active tab styling
            document.querySelectorAll('.tab').forEach(tab => {
                tab.classList.remove('active');
            });
            event.target.classList.add('active');
            
            // Hide all tabs
            document.getElementById('swipeTab').classList.add('hidden');
            document.getElementById('matchesTab').classList.add('hidden');
            document.getElementById('sessionsTab').classList.add('hidden');
            document.getElementById('debtTab').classList.add('hidden');
            
            // Show selected tab and render
            if (tabName === 'swipe') {
                document.getElementById('swipeTab').classList.remove('hidden');
                renderSwipeTab();
            } else if (tabName === 'matches') {
                document.getElementById('matchesTab').classList.remove('hidden');
                renderMatchesTab();
            } else if (tabName === 'sessions') {
                document.getElementById('sessionsTab').classList.remove('hidden');
                renderSessionsTab();
            } else if (tabName === 'debt') {
                document.getElementById('debtTab').classList.remove('hidden');
                renderDebtTab();
            }
        }
        
        // Initialize
        renderSwipeTab();
    </script>
</body>
</html>
