<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 NHL Playoffs · 6 Friends Bracket</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: system-ui, 'Segoe UI', sans-serif;
        }
        body {
            background: linear-gradient(145deg, #0a2f2a 0%, #051d1a 100%);
            margin: 0;
            padding: 20px;
            color: #eef4ff;
        }
        .container {
            max-width: 1600px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            color: #FFD966;
            margin-bottom: 5px;
        }
        .sub {
            text-align: center;
            color: #b9f6e4;
            margin-bottom: 20px;
            font-size: 0.9rem;
        }
        .score-bar {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 12px;
            margin: 20px 0;
        }
        .score-chip {
            background: #122e2a;
            border-radius: 60px;
            padding: 6px 18px;
            display: flex;
            gap: 12px;
            border-left: 4px solid #ffb347;
            font-weight: bold;
        }
        .leader {
            text-align: center;
            background: #071e1b70;
            border-radius: 60px;
            padding: 8px;
            width: fit-content;
            margin: 0 auto 20px auto;
        }
        .bracket {
            display: flex;
            gap: 24px;
            overflow-x: auto;
        }
        .round {
            flex: 1;
            background: #0000004d;
            border-radius: 32px;
            padding: 16px;
            min-width: 380px;
        }
        .round h3 {
            text-align: center;
            margin-top: 0;
            margin-bottom: 20px;
            border-bottom: 2px solid #ffb34788;
            padding-bottom: 8px;
        }
        .matchup {
            background: #102b27e0;
            border-radius: 28px;
            padding: 14px;
            margin-bottom: 28px;
            border: 1px solid #3c8b7e;
        }
        .series-title {
            font-size: 0.75rem;
            background: #00000066;
            display: inline-block;
            padding: 4px 12px;
            border-radius: 40px;
            margin-bottom: 12px;
        }
        .team-row {
            background: #0a211e;
            margin: 8px 0;
            border-radius: 60px;
            padding: 8px 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
        }
        .team-name {
            font-weight: 800;
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }
        .friend-list {
            display: inline-flex;
            flex-wrap: wrap;
            gap: 6px;
            background: #02100e80;
            padding: 4px 10px;
            border-radius: 40px;
            font-size: 0.7rem;
        }
        .friend-badge {
            background: #2c5a54;
            padding: 2px 8px;
            border-radius: 30px;
        }
        .games {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin: 12px 0;
        }
        .game-box {
            background: #071815;
            border-radius: 20px;
            padding: 4px 8px;
            display: inline-flex;
            gap: 6px;
            align-items: center;
        }
        .game-box.winner {
            background: linear-gradient(135deg, #2b8c5e, #1a6b46);
            box-shadow: 0 0 0 2px #ffd966;
        }
        .game-box.loser {
            background: #4a2a2a;
            opacity: 0.85;
        }
        .game-box label {
            font-size: 0.6rem;
            font-weight: 600;
        }
        .game-box input {
            width: 48px;
            background: #2c5a54;
            border: none;
            border-radius: 20px;
            padding: 4px;
            color: white;
            text-align: center;
            font-weight: bold;
        }
        .winner-btn {
            background: #ffb347;
            border: none;
            border-radius: 40px;
            padding: 4px 12px;
            cursor: pointer;
            font-weight: bold;
        }
        .winner-badge {
            background: gold;
            padding: 4px 12px;
            border-radius: 40px;
            font-size: 0.7rem;
            font-weight: bold;
            color: #1f2f2c;
        }
        .picks {
            margin-top: 14px;
            background: #02100e70;
            border-radius: 24px;
            padding: 10px;
        }
        .picks-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        .pick {
            background: #1f4640;
            border-radius: 40px;
            padding: 5px 12px;
            font-size: 0.75rem;
        }
        .pick.correct {
            background: #2b8c5e;
            box-shadow: 0 0 0 1px #f9d56e;
        }
        .pick.wrong {
            background: #7a2e3f;
            text-decoration: line-through;
        }
        footer {
            text-align: center;
            margin-top: 30px;
            font-size: 0.7rem;
            opacity: 0.6;
        }
        @media (max-width: 800px) {
            .game-box input { width: 42px; }
            .round { min-width: 350px; }
        }
    </style>
</head>
<body>
<div class="container">
    <h1>🏒 2026 STANLEY CUP PLAYOFFS</h1>
    <div class="sub">6 Friends Bracket Challenge · Round 1</div>
    
    <div id="scoreBar" class="score-bar"></div>
    <div id="leader" class="leader"></div>
    
    <div class="bracket" id="bracket"></div>
    <footer>✅ Green = correct pick | Game winner boxes light up gold | Click any "Set Winner" button when series ends</footer>
</div>

<script>
    // ============================================
    // DATA FROM YOUR JSON FILE
    // ============================================
    var MATCHUPS = [
        { id: "E1", conf: "Eastern", topTeam: "Buffalo Sabres", bottomTeam: "Boston Bruins", winner: null },
        { id: "E2", conf: "Eastern", topTeam: "Tampa Bay Lightning", bottomTeam: "Montreal Canadiens", winner: null },
        { id: "E3", conf: "Eastern", topTeam: "Carolina Hurricanes", bottomTeam: "Ottawa Senators", winner: null },
        { id: "E4", conf: "Eastern", topTeam: "Philadelphia Flyers", bottomTeam: "Pittsburgh Penguins", winner: null },
        { id: "W1", conf: "Western", topTeam: "Colorado Avalanche", bottomTeam: "Los Angeles Kings", winner: null },
        { id: "W2", conf: "Western", topTeam: "Dallas Stars", bottomTeam: "Minnesota Wild", winner: null },
        { id: "W3", conf: "Western", topTeam: "Vegas Golden Knights", bottomTeam: "Utah Mammoth", winner: null },
        { id: "W4", conf: "Western", topTeam: "Edmonton Oilers", bottomTeam: "Anaheim Ducks", winner: null }
    ];
    
    var friends = ["Marc", "M-A", "Fred", "Frank", "Eric", "Nick"];
    
    // PICKS MATRIX [friend][matchup]
    var picksMatrix = [
        ["Buffalo Sabres", "Montreal Canadiens", "Carolina Hurricanes", "Philadelphia Flyers", "Colorado Avalanche", "Minnesota Wild", "Utah Mammoth", "Edmonton Oilers"],
        ["Boston Bruins", "Tampa Bay Lightning", "Carolina Hurricanes", "Pittsburgh Penguins", "Colorado Avalanche", "Dallas Stars", "Vegas Golden Knights", "Edmonton Oilers"],
        ["Buffalo Sabres", "Montreal Canadiens", "Carolina Hurricanes", "Pittsburgh Penguins", "Colorado Avalanche", "Dallas Stars", "Vegas Golden Knights", "Edmonton Oilers"],
        ["Boston Bruins", "Montreal Canadiens", "Ottawa Senators", "Pittsburgh Penguins", "Colorado Avalanche", "Dallas Stars", "Utah Mammoth", "Edmonton Oilers"],
        ["Buffalo Sabres", "Montreal Canadiens", "Carolina Hurricanes", "Philadelphia Flyers", "Colorado Avalanche", "Dallas Stars", "Vegas Golden Knights", "Edmonton Oilers"],
        ["Buffalo Sabres", "Montreal Canadiens", "Carolina Hurricanes", "Philadelphia Flyers", "Colorado Avalanche", "Minnesota Wild", "Vegas Golden Knights", "Edmonton Oilers"]
    ];
    
    // ACTUAL WINNERS (all null for now - you'll click buttons to set them)
    var actualWinners = [null, null, null, null, null, null, null, null];
    
    // SCORES DATA [matchup][team][game] - includes your scores from JSON
    var scoresData = [
        [ [null, 4, null, null, null, null, null, null], [null, 3, null, null, null, null, null, null] ],
        [ [null, 3, null, null, null, null, null, null], [null, 4, null, null, null, null, null, null] ],
        [ [null, 2, 3, null, null, null, null, null], [null, 0, 2, null, null, null, null, null] ],
        [ [null, 3, 3, null, null, null, null, null], [null, 2, 0, null, null, null, null, null] ],
        [ [null, 2, null, null, null, null, null, null], [null, 1, null, null, null, null, null, null] ],
        [ [null, 1, 4, null, null, null, null, null], [null, 6, 2, null, null, null, null, null] ],
        [ [null, 4, null, null, null, null, null, null], [null, 2, null, null, null, null, null, null] ],
        [ [null, 4, null, null, null, null, null, null], [null, 3, null, null, null, null, null, null] ]
    ];
    
    // Helper functions
    function escapeHtml(s) {
        if (!s) return '';
        return String(s).replace(/[&<>]/g, function(m) {
            return m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;';
        });
    }
    
    function gameWinner(midx, tidx, gameNum) {
        var thisScore = scoresData[midx][tidx][gameNum];
        var otherScore = scoresData[midx][tidx === 0 ? 1 : 0][gameNum];
        return thisScore !== null && otherScore !== null && thisScore > otherScore;
    }
    
    function computeScores() {
        var scores = new Array(friends.length).fill(0);
        for (var f = 0; f < friends.length; f++) {
            for (var m = 0; m < MATCHUPS.length; m++) {
                if (actualWinners[m] && picksMatrix[f][m] === actualWinners[m]) {
                    scores[f]++;
                }
            }
        }
        return scores;
    }
    
    // Main render function
    function render() {
        // Update score bar
        var scores = computeScores();
        var scoreBar = document.getElementById('scoreBar');
        scoreBar.innerHTML = '';
        for (var i = 0; i < friends.length; i++) {
            scoreBar.innerHTML += '<div class="score-chip"><span>' + escapeHtml(friends[i]) + '</span><span>' + scores[i] + '/' + MATCHUPS.length + '</span></div>';
        }
        
        // Update leader
        var maxScore = Math.max.apply(null, scores);
        var leaders = [];
        for (var i = 0; i < friends.length; i++) {
            if (scores[i] === maxScore) leaders.push(escapeHtml(friends[i]));
        }
        document.getElementById('leader').innerHTML = '🏆 CURRENT LEADER' + (leaders.length > 1 ? 'S' : '') + ': ' + leaders.join(', ') + ' (' + maxScore + ' correct picks) 🏆';
        
        // Build bracket
        var bracket = document.getElementById('bracket');
        bracket.innerHTML = '';
        var roundCol = document.createElement('div');
        roundCol.className = 'round';
        roundCol.innerHTML = '<h3>🥅 ROUND 1 · 2026</h3>';
        
        for (var m = 0; m < MATCHUPS.length; m++) {
            var mu = MATCHUPS[m];
            
            // Find which friends picked which team
            var topFriends = [], bottomFriends = [];
            for (var f = 0; f < friends.length; f++) {
                if (picksMatrix[f][m] === mu.topTeam) {
                    topFriends.push(friends[f]);
                } else {
                    bottomFriends.push(friends[f]);
                }
            }
            
            var matchupDiv = document.createElement('div');
            matchupDiv.className = 'matchup';
            matchupDiv.innerHTML = 
                '<div class="series-title">' + mu.conf + ' · ' + mu.id + '</div>' +
                '<div class="team-row">' +
                    '<div class="team-name">🐙 ' + escapeHtml(mu.topTeam) + ' <div class="friend-list">' + topFriends.map(function(f) { return '<span class="friend-badge">' + escapeHtml(f) + '</span>'; }).join('') + '</div></div>' +
                    '<button class="winner-btn" data-team="' + escapeHtml(mu.topTeam) + '" data-midx="' + m + '">🏆 Set Winner</button>' +
                '</div>' +
                '<div class="team-row">' +
                    '<div class="team-name">⚡ ' + escapeHtml(mu.bottomTeam) + ' <div class="friend-list">' + bottomFriends.map(function(f) { return '<span class="friend-badge">' + escapeHtml(f) + '</span>'; }).join('') + '</div></div>' +
                    '<button class="winner-btn" data-team="' + escapeHtml(mu.bottomTeam) + '" data-midx="' + m + '">🏆 Set Winner</button>' +
                '</div>' +
                '<div style="text-align:center; margin:8px 0;">' + (actualWinners[m] ? '<span class="winner-badge">✅ SERIES WINNER: ' + escapeHtml(actualWinners[m]) + '</span>' : '<span style="opacity:0.6;">⚡ No winner set yet (click button when series ends)</span>') + '</div>' +
                '<div class="picks"><div class="picks-list" id="picks-' + m + '"></div></div>';
            
            // Add picks
            var picksDiv = matchupDiv.querySelector('.picks-list');
            for (var f = 0; f < friends.length; f++) {
                var pick = picksMatrix[f][m];
                var isCorrect = (actualWinners[m] && pick === actualWinners[m]);
                var pickSpan = document.createElement('div');
                pickSpan.className = 'pick ' + (isCorrect ? 'correct' : (actualWinners[m] ? 'wrong' : ''));
                pickSpan.innerHTML = '<span style="font-weight:800;">' + escapeHtml(friends[f]) + ':</span> ' + escapeHtml(pick);
                picksDiv.appendChild(pickSpan);
            }
            
            // Add game scores
            var gamesDiv = document.createElement('div');
            gamesDiv.className = 'games';
            for (var g = 1; g <= 7; g++) {
                var topVal = scoresData[m][0][g] !== null ? scoresData[m][0][g] : '';
                var botVal = scoresData[m][1][g] !== null ? scoresData[m][1][g] : '';
                var topWin = gameWinner(m, 0, g);
                var botWin = gameWinner(m, 1, g);
                var topClass = topWin ? 'winner' : (scoresData[m][0][g] !== null && scoresData[m][1][g] !== null ? 'loser' : '');
                var botClass = botWin ? 'winner' : (scoresData[m][0][g] !== null && scoresData[m][1][g] !== null ? 'loser' : '');
                gamesDiv.innerHTML += '<div class="game-box ' + topClass + '"><label>G' + g + '</label><input class="score-inp" data-midx="' + m + '" data-team="0" data-game="' + g + '" value="' + topVal + '" style="width:48px;"></div>';
                gamesDiv.innerHTML += '<div class="game-box ' + botClass + '"><label>G' + g + '</label><input class="score-inp" data-midx="' + m + '" data-team="1" data-game="' + g + '" value="' + botVal + '" style="width:48px;"></div>';
            }
            matchupDiv.insertBefore(gamesDiv, matchupDiv.querySelector('.picks'));
            roundCol.appendChild(matchupDiv);
        }
        
        bracket.appendChild(roundCol);
        
        // Attach winner button events
        var winnerBtns = document.querySelectorAll('.winner-btn');
        for (var i = 0; i < winnerBtns.length; i++) {
            winnerBtns[i].onclick = function() {
                var midx = parseInt(this.getAttribute('data-midx'));
                var team = this.getAttribute('data-team');
                actualWinners[midx] = team;
                render();
            };
        }
        
        // Attach score input events
        var scoreInputs = document.querySelectorAll('.score-inp');
        for (var i = 0; i < scoreInputs.length; i++) {
            scoreInputs[i].onchange = function() {
                var midx = parseInt(this.getAttribute('data-midx'));
                var team = parseInt(this.getAttribute('data-team'));
                var game = parseInt(this.getAttribute('data-game'));
                var val = this.value.trim();
                scoresData[midx][team][game] = val === '' ? null : parseInt(val);
                render();
            };
        }
    }
    
    // Start the app
    render();
</script>
</body>
</html>
