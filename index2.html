<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkillSwap - Demo</title>
    <style>
        /* Copy all the CSS from your original file here */
        /* (I'll include it below - keep your existing styles) */
    </style>
</head>
<body>
    <div id="app"></div>

    <script src="https://unpkg.com/react@18.2.0/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.development.js"></script>
    
    <script>
        // Static demo data - no API calls
        const demoData = {
            currentUser: {
                id: 1,
                username: "DemoUser",
                reputation: 42,
                completed_trades: 12
            },
            matches: [
                { id: 1, status: 'confirmed', partner: { username: "Sarah", reputation: 38, email: "sarah@example.com", phone: "+1234567890" }, your_skill: { title: "Python" }, their_skill: { title: "Guitar" }, is_sender: false },
                { id: 2, status: 'pending', partner: { username: "Mike", reputation: 25, email: "mike@example.com", phone: "+1987654321" }, your_skill: { title: "JavaScript" }, their_skill: { title: "Spanish" }, is_sender: true }
            ],
            sessions: [
                { id: 1, status: 'scheduled', partner: { username: "Sarah" }, your_skill: "Python", their_skill: "Guitar", scheduled_time: "2024-03-15 at 3:00 PM", location: "Zoom", notes: "Bring your guitar" }
            ],
            userSkills: [
                { id: 1, title: "Python Programming", category: "Programming", description: "Beginner to intermediate Python" },
                { id: 2, title: "JavaScript", category: "Programming", description: "React and Node.js" }
            ],
            availableSkills: [
                { id: 1, title: "Guitar", category: "Music", description: "Acoustic guitar lessons for beginners", user: { username: "Sarah", reputation: 38 } },
                { id: 2, title: "Spanish", category: "Language", description: "Conversational Spanish", user: { username: "Mike", reputation: 25 } },
                { id: 3, title: "Yoga", category: "Fitness", description: "Beginner yoga classes", user: { username: "Emma", reputation: 52 } }
            ],
            debt: { balance: 5, given: 15, received: 10, completed_trades: 12, reputation: 42 }
        };

        function App() {
            const [activeTab, setActiveTab] = React.useState('swipe');
            const [matches] = React.useState(demoData.matches);
            const [sessions] = React.useState(demoData.sessions);
            const [userSkills] = React.useState(demoData.userSkills);
            const [availableSkills] = React.useState(demoData.availableSkills);
            const [debt] = React.useState(demoData.debt);
            const [currentSwipeIndex, setCurrentSwipeIndex] = React.useState(0);
            const [showAddSkill, setShowAddSkill] = React.useState(false);
            const [showChat, setShowChat] = React.useState(false);
            const [showSchedule, setShowSchedule] = React.useState(false);
            const [selectedMatch, setSelectedMatch] = React.useState(null);
            const [messages, setMessages] = React.useState([]);

            const showMessage = (msg, type = 'success') => {
                const div = document.createElement('div');
                div.className = 'message';
                div.style.background = type === 'success' ? '#51cf66' : '#ff6b6b';
                div.textContent = msg;
                document.body.appendChild(div);
                setTimeout(() => div.remove(), 3000);
            };

            const handleSwipe = (skill) => {
                showMessage(`Interest sent to ${skill.user.username}! (Demo mode)`);
                setCurrentSwipeIndex((currentSwipeIndex + 1) % availableSkills.length);
            };

            const confirmMatch = (matchId) => {
                showMessage('Match confirmed! (Demo mode)');
            };

            const scheduleSession = (match, data) => {
                showMessage(`Session scheduled for ${data.date} at ${data.time}! (Demo mode)`);
                setShowSchedule(false);
            };

            const completeSession = (sessionId) => {
                showMessage('Session marked as completed! (Demo mode)');
            };

            const sendMessage = (matchId, content) => {
                const newMsg = { id: Date.now(), content, is_sent: true, timestamp: new Date().toISOString() };
                setMessages([...messages, newMsg]);
                showMessage('Message sent! (Demo mode)');
            };

            // Render functions here (same as your original, but using the state variables above)
            // I'll include the full render functions below
            
            const renderSwipeTab = () => {
                if (userSkills.length === 0) {
                    return React.createElement('div', { className: 'swipe-container' },
                        React.createElement('div', { className: 'swipe-card' },
                            React.createElement('h3', {}, '📝 Add a skill first!'),
                            React.createElement('p', {}, 'You need to add a skill you can teach before you can learn from others.'),
                            React.createElement('button', { className: 'btn-primary', onClick: () => setShowAddSkill(true) }, '+ Add Your First Skill')));
                }
                
                if (availableSkills.length === 0) {
                    return React.createElement('div', { className: 'swipe-container' },
                        React.createElement('div', { className: 'swipe-card' },
                            React.createElement('h3', {}, 'No skills available'),
                            React.createElement('p', {}, 'Check back later!')));
                }

                const skill = availableSkills[currentSwipeIndex];
                return React.createElement('div', { className: 'swipe-container' },
                    React.createElement('div', { className: 'swipe-card' },
                        React.createElement('h2', {}, skill.title),
                        React.createElement('span', { className: 'skill-category' }, skill.category),
                        React.createElement('p', { style: { marginTop: '20px' } }, skill.description),
                        React.createElement('div', { style: { marginTop: '20px', paddingTop: '20px', borderTop: '1px solid rgba(0,0,0,0.1)' } },
                            React.createElement('p', {}, `Offered by: ${skill.user.username}`),
                            React.createElement('p', {}, `⭐ ${skill.user.reputation} reputation`))),
                    React.createElement('div', { className: 'swipe-actions' },
                        React.createElement('button', { className: 'swipe-btn no', onClick: () => setCurrentSwipeIndex((currentSwipeIndex + 1) % availableSkills.length) }, '👎 Pass'),
                        React.createElement('button', { className: 'swipe-btn yes', onClick: () => handleSwipe(skill) }, '👍 Interested')));
            };

            const renderMatchesTab = () => {
                const pendingIncoming = matches.filter(m => m.status === 'pending' && !m.is_sender);
                const pendingOutgoing = matches.filter(m => m.status === 'pending' && m.is_sender);
                const confirmed = matches.filter(m => m.status === 'confirmed');
                
                if (matches.length === 0) {
                    return React.createElement('div', { className: 'form-container' },
                        React.createElement('h3', { style: { textAlign: 'center' } }, '💕 No matches yet'),
                        React.createElement('p', { style: { textAlign: 'center' } }, 'Swipe on skills you want to learn!'));
                }

                return React.createElement('div', {},
                    pendingIncoming.length > 0 && React.createElement(React.Fragment, {},
                        React.createElement('h3', { className: 'section-title', style: { color: '#ff9f43' } }, `📨 Pending Requests (${pendingIncoming.length})`),
                        React.createElement('div', { className: 'cards-container' },
                            pendingIncoming.map(m => React.createElement('div', { key: m.id, className: 'skill-card' },
                                React.createElement('div', { className: 'skill-header' },
                                    React.createElement('div', { className: 'skill-title' }, m.their_skill.title),
                                    React.createElement('span', { className: 'badge pending' }, 'Awaiting Response')),
                                React.createElement('p', { className: 'skill-description' }, `${m.partner.username} wants to teach you ${m.their_skill.title}`),
                                React.createElement('div', { className: 'skill-footer' },
                                    React.createElement('button', { className: 'btn-success', onClick: () => confirmMatch(m.id) }, '✅ Accept Match'),
                                    React.createElement('button', { className: 'btn-primary', onClick: () => {
                                        setSelectedMatch(m);
                                        setShowChat(true);
                                        setMessages([]);
                                    } }, '💬 Message')))))),
                    
                    pendingOutgoing.length > 0 && React.createElement(React.Fragment, {},
                        React.createElement('h3', { className: 'section-title', style: { color: '#667eea' } }, `📤 Sent Requests (${pendingOutgoing.length})`),
                        React.createElement('div', { className: 'cards-container' },
                            pendingOutgoing.map(m => React.createElement('div', { key: m.id, className: 'skill-card' },
                                React.createElement('div', { className: 'skill-header' },
                                    React.createElement('div', { className: 'skill-title' }, m.their_skill.title),
                                    React.createElement('span', { className: 'badge pending' }, 'Waiting')),
                                React.createElement('div', { className: 'skill-footer' },
                                    React.createElement('button', { className: 'btn-primary', onClick: () => {
                                        setSelectedMatch(m);
                                        setShowChat(true);
                                        setMessages([]);
                                    } }, '💬 Message')))))),
                    
                    confirmed.length > 0 && React.createElement(React.Fragment, {},
                        React.createElement('h3', { className: 'section-title', style: { color: '#51cf66' } }, `✅ Confirmed Matches (${confirmed.length})`),
                        React.createElement('div', { className: 'cards-container' },
                            confirmed.map(m => React.createElement('div', { key: m.id, className: 'skill-card' },
                                React.createElement('div', { className: 'skill-header' },
                                    React.createElement('div', { className: 'skill-title' }, `${m.your_skill.title} ⇄ ${m.their_skill.title}`),
                                    React.createElement('span', { className: 'badge confirmed' }, 'Confirmed')),
                                React.createElement('p', {}, `With ${m.partner.username} (⭐ ${m.partner.reputation})`),
                                React.createElement('div', { className: 'skill-footer' },
                                    React.createElement('button', { className: 'btn-primary', onClick: () => {
                                        setSelectedMatch(m);
                                        setShowChat(true);
                                        setMessages([]);
                                    } }, '💬 Message'),
                                    React.createElement('button', { className: 'btn-warning', onClick: () => {
                                        setSelectedMatch(m);
                                        setShowSchedule(true);
                                    } }, '📅 Schedule Meeting')))))));
            };

            const renderSessionsTab = () => {
                if (sessions.length === 0) {
                    return React.createElement('div', { className: 'form-container' },
                        React.createElement('h3', { style: { textAlign: 'center' } }, '📅 No sessions yet'));
                }

                return React.createElement('div', {},
                    React.createElement('h2', {}, 'Your Sessions'),
                    React.createElement('div', { className: 'cards-container' },
                        sessions.map(s => React.createElement('div', { key: s.id, className: 'skill-card' },
                            React.createElement('div', { className: 'skill-header' },
                                React.createElement('div', { className: 'skill-title' }, `With ${s.partner.username}`),
                                React.createElement('span', { className: `badge ${s.status}` }, s.status)),
                            React.createElement('p', null, `🤝 You teach: ${s.your_skill}`),
                            React.createElement('p', null, `📚 You learn: ${s.their_skill}`),
                            React.createElement('p', { style: { fontWeight: 'bold' } }, `📅 ${s.scheduled_time}`),
                            s.location && React.createElement('p', null, `📍 ${s.location}`),
                            React.createElement('div', { className: 'skill-footer' },
                                React.createElement('button', { className: 'btn-success', onClick: () => completeSession(s.id) }, '✓ Mark Completed')))));
            };

            const renderDebtTab = () => {
                return React.createElement('div', { className: 'form-container' },
                    React.createElement('h2', {}, '💰 Debt Tracking'),
                    React.createElement('div', { style: { textAlign: 'center', padding: '20px', background: '#f8f9fa', borderRadius: '15px', marginBottom: '20px' } },
                        React.createElement('h3', {}, 'Your Balance'),
                        React.createElement('p', { style: { fontSize: '48px', fontWeight: 'bold', color: debt.balance >= 0 ? '#51cf66' : '#ff6b6b' } }, `${debt.balance} hours`),
                        React.createElement('p', {}, debt.balance >= 0 ? '✨ You\'ve taught more' : '📚 You\'ve learned more')),
                    React.createElement('div', {},
                        React.createElement('p', {}, `✅ Hours taught: ${debt.given}`),
                        React.createElement('p', {}, `📖 Hours learned: ${debt.received}`),
                        React.createElement('p', {}, `🤝 Total trades: ${debt.completed_trades}`),
                        React.createElement('p', {}, `⭐ Reputation: ${debt.reputation}/5`)));
            };

            // ScheduleModal and ChatModal components (simplified)
            const ScheduleModal = () => {
                const [data, setData] = React.useState({ date: '', time: '', location: '', notes: '' });
                return React.createElement('div', { className: 'modal', onClick: () => setShowSchedule(false) },
                    React.createElement('div', { className: 'modal-content', onClick: e => e.stopPropagation() },
                        React.createElement('h2', {}, `📅 Schedule with ${selectedMatch?.partner.username}`),
                        React.createElement('div', { className: 'form-group' },
                            React.createElement('label', {}, 'Date *'),
                            React.createElement('input', { type: 'date', value: data.date, onChange: e => setData({...data, date: e.target.value}) })),
                        React.createElement('div', { className: 'form-group' },
                            React.createElement('label', {}, 'Time *'),
                            React.createElement('input', { type: 'time', value: data.time, onChange: e => setData({...data, time: e.target.value}) })),
                        React.createElement('div', { className: 'form-group' },
                            React.createElement('label', {}, 'Location'),
                            React.createElement('input', { type: 'text', value: data.location, onChange: e => setData({...data, location: e.target.value}) })),
                        React.createElement('div', { className: 'skill-footer', style: { marginTop: '20px' } },
                            React.createElement('button', { className: 'btn-success', onClick: () => scheduleSession(selectedMatch, data) }, 'Schedule'),
                            React.createElement('button', { className: 'btn-primary', onClick: () => setShowSchedule(false) }, 'Cancel'))));
            };

            const ChatModal = () => {
                const [newMsg, setNewMsg] = React.useState('');
                const msgsEndRef = React.useRef(null);
                
                React.useEffect(() => {
                    msgsEndRef.current?.scrollIntoView({ behavior: 'smooth' });
                }, [messages]);
                
                return React.createElement('div', { className: 'modal', onClick: () => setShowChat(false) },
                    React.createElement('div', { className: 'modal-content', onClick: e => e.stopPropagation() },
                        React.createElement('h2', {}, `💬 Chat with ${selectedMatch?.partner.username}`),
                        React.createElement('div', { className: 'chat-container' },
                            React.createElement('div', { className: 'chat-messages' },
                                messages.map(m => React.createElement('div', { key: m.id, className: `message-bubble ${m.is_sent ? 'sent' : 'received'}` },
                                    React.createElement('div', { className: 'message-content' }, m.content))),
                                React.createElement('div', { ref: msgsEndRef })),
                            React.createElement('div', { className: 'chat-input' },
                                React.createElement('input', { value: newMsg, onChange: e => setNewMsg(e.target.value), placeholder: 'Type a message...', onKeyPress: e => e.key === 'Enter' && (() => { if(newMsg.trim()) { sendMessage(selectedMatch.id, newMsg); setNewMsg(''); } })() }),
                                React.createElement('button', { className: 'btn-primary', onClick: () => { if(newMsg.trim()) { sendMessage(selectedMatch.id, newMsg); setNewMsg(''); } } }, 'Send'))),
                        React.createElement('button', { className: 'btn-primary', onClick: () => setShowChat(false), style: { marginTop: '15px', background: '#999' } }, 'Close')));
            };

            return React.createElement('div', { className: 'app-container' },
                React.createElement('div', { className: 'header' },
                    React.createElement('div', { className: 'logo' },
                        React.createElement('h1', {}, '⚡ SkillSwap'),
                        React.createElement('p', {}, 'Barter skills, build community (Demo)')),
                    React.createElement('div', { className: 'user-info' },
                        React.createElement('div', { className: 'reputation' }, `⭐ ${demoData.currentUser.reputation} | ${demoData.currentUser.completed_trades} trades`),
                        React.createElement('a', { href: '#', className: 'btn-logout', onClick: (e) => { e.preventDefault(); showMessage('Demo mode - no logout'); } }, 'Logout'))),
                React.createElement('div', { className: 'tabs' },
                    React.createElement('button', { className: `tab ${activeTab === 'swipe' ? 'active' : ''}`, onClick: () => setActiveTab('swipe') }, '🔍 Discover'),
                    React.createElement('button', { className: `tab ${activeTab === 'matches' ? 'active' : ''}`, onClick: () => setActiveTab('matches') }, `💕 Matches (${matches.length})`),
                    React.createElement('button', { className: `tab ${activeTab === 'sessions' ? 'active' : ''}`, onClick: () => setActiveTab('sessions') }, `📅 Sessions (${sessions.length})`),
                    React.createElement('button', { className: `tab ${activeTab === 'debt' ? 'active' : ''}`, onClick: () => setActiveTab('debt') }, '💰 Debt'),
                    React.createElement('button', { className: 'tab', onClick: () => showMessage('Demo mode - add skill not implemented') }, '+ Add Skill')),
                
                activeTab === 'swipe' && renderSwipeTab(),
                activeTab === 'matches' && renderMatchesTab(),
                activeTab === 'sessions' && renderSessionsTab(),
                activeTab === 'debt' && renderDebtTab(),
                
                showSchedule && selectedMatch && React.createElement(ScheduleModal, null),
                showChat && selectedMatch && React.createElement(ChatModal, null));
        }

        ReactDOM.render(React.createElement(App), document.getElementById('app'));
    </script>
</body>
</html>
